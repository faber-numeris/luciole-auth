info:
  name: Request password reset
  type: http
  seq: 1

http:
  method: POST
  url: http://{{baseUrl}}/authn/password/reset-request
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "<email>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Sends a password reset link to the user's email
