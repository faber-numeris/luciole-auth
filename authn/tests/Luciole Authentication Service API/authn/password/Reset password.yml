info:
  name: Reset password
  type: http
  seq: 2

http:
  method: POST
  url: http://{{baseUrl}}/authn/password/reset
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "<string>",
        "newPassword": "<string>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Resets the user's password using a valid reset token
