info:
  name: Reset password
  type: http
  seq: 1

http:
  method: POST
  url: {{baseUrl}}/authn/password/reset
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "<string>",
        "newPassword": "<string>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Password successfully reset
    request:
      url: {{baseUrl}}/authn/password/reset
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Accept
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "<string>",
            "newPassword": "<string>"
          }
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "<string>"
          }
  - name: Invalid request data or token
    request:
