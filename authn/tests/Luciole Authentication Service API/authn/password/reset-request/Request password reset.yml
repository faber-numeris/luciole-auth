info:
  name: Request password reset
  type: http
  seq: 1

http:
  method: POST
  url: http://{{baseUrl}}/authn/password/reset-request
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "<email>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Password reset email sent
    request:
      url: http://{{baseUrl}}/authn/password/reset-request
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Accept
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "<email>"
          }
    response:
      statusText: "202"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "<string>"
