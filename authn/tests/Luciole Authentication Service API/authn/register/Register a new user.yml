info:
  name: Register a new user
  type: http
  seq: 2

http:
  method: POST
  url: {{baseUrl}}/authn/register
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}",
        "firstName": "{{firstName}}",
        "lastName": "{{lastName}}",
        "locale": "en-CA",
        "timezone": "America/Toronto"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("userID",res.body.id)


docs: Creates a new user account with the provided credentials
