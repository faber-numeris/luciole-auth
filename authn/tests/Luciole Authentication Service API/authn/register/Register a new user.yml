info:
  name: Register a new user
  type: http
  seq: 2

http:
  method: POST
  url: http://{{baseUrl}}/authn/register
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}",
        "firstName": "{{firstName}}",
        "lastName": "{{lastName}}",
        "locale": "en-CA",
        "timezone": "America/Toronto"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("userID",res.body.id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: User successfully registered
    request:
      url: http://{{baseUrl}}/authn/register
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Accept
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "<email>",
            "password": "<string>",
            "firstName": "<string>",
            "lastName": "<string>",
            "locale": "<string>",
            "timezone": "<string>"
          }
    response:
      statusText: "201"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "SFFMC61GPHSDM33THYAG6Y0W11",
