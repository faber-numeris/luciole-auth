info:
  name: User login
  type: http
  seq: 6

http:
  method: POST
  url: http://{{baseUrl}}/authn/login
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Authenticates a user and returns an opaque access token
