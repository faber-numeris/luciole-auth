info:
  name: Confirm user registration
  type: http
  seq: 5

http:
  method: GET
  url: http://{{baseUrl}}/authn/confirm?token={{USER_REGISTRATION_TOKEN}}
  headers:
    - name: Accept
      value: application/json
  params:
    - name: token
      value: "{{USER_REGISTRATION_TOKEN}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Confirms a user's email address using a confirmation token
