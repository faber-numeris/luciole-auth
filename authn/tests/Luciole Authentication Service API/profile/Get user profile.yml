info:
  name: Get user profile
  type: http
  seq: 1

http:
  method: GET
  url: http://{{baseUrl}}/profile
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{bearerToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Profile retrieved successfully
    request:
      url: http://{{baseUrl}}/profile
      method: GET
      headers:
        - name: Accept
          value: application/json
        - name: Authorization
          value: Bearer <token>
          description: "Added as a part of security scheme: bearer"
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "SFFMC61GPHSDM33THYAG6Y0W11",
            "type": "USER",
            "email": "<email>",
            "firstName": "<string>",
            "lastName": "<string>",
            "locale": "<string>",
            "timezone": "<string>"
          }
  - name: Unauthorized - Invalid or missing token
    request:
      url: http://{{baseUrl}}/profile
      method: GET
      headers:
        - name: Accept
          value: application/json
        - name: Authorization
          value: Bearer <token>
          description: "Added as a part of security scheme: bearer"
    response:
      statusText: "401"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "<string>",
            "message": "<string>",
            "details": {
              "key_0": "string"
            }
          }
  - name: Internal server error
    request:
      url: http://{{baseUrl}}/profile
      method: GET
      headers:
        - name: Accept
          value: application/json
        - name: Authorization
          value: Bearer <token>
          description: "Added as a part of security scheme: bearer"
    response:
      statusText: "500"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "<string>",
            "message": "<string>",
            "details": {
              "key_0": "string"
            }
          }

docs: Retrieves the authenticated user's profile information
