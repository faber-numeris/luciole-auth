info:
  name: Update user profile
  type: http
  seq: 2

http:
  method: PUT
  url: http://{{baseUrl}}/profile
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstName": "<string>",
        "lastName": "<string>",
        "locale": "<string>",
        "timezone": "<string>"
      }
  auth:
    type: bearer
    token: "{{bearerToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Profile updated successfully
    request:
      url: http://{{baseUrl}}/profile
      method: PUT
      headers:
        - name: Content-Type
          value: application/json
        - name: Accept
          value: application/json
        - name: Authorization
          value: Bearer <token>
          description: "Added as a part of security scheme: bearer"
      body:
        type: json
        data: |-
          {
            "firstName": "<string>",
            "lastName": "<string>",
            "locale": "<string>",
            "timezone": "<string>"
          }
    response:
      statusText: "200"
      headers:
